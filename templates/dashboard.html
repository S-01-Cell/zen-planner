<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
    <title>ZenPlanner | Dashboard</title>
</head>

<body>
    <div class="desktop-wrapper">
        <aside class="sidebar">
            <h1 class="brand-gold" onclick="location.href='/dashboard'">ZenPlanner</h1>
            <p style="color: #a2a3b7; font-size: 0.85rem; padding: 0 20px; margin-bottom: 20px;">
                👤 {{ user.email }}
            </p>
            <nav>
                <div class="nav-item active" onclick="location.href='/dashboard'">🏠 Dashboard</div>
                <div class="nav-item" onclick="location.href='/calendar'">📅 Calendar</div>
                <div class="nav-item" onclick="location.href='/analytics'">📊 Analytics</div>
                <div class="nav-item" onclick="location.href='/logout'" style="margin-top: 20px; color: #ff4d4d;">🚪
                    Logout</div>
            </nav>
        </aside>

        <main class="main-content">
            <header>
                <h2 id="modalTitleMain">Today's Tasks</h2>
                <p id="currentDate"></p>
            </header>

            <div class="filter-wrapper" style="margin-bottom: 20px;">
                <div class="filter-bar" style="display: flex; gap: 10px; flex-wrap: wrap;">
                    <button onclick="filterTasks('All')" class="action-btn">All</button>
                    <button onclick="filterTasks('Work')" class="action-btn">Work</button>
                    <button onclick="filterTasks('Personal')" class="action-btn">Personal</button>
                    <button onclick="filterTasks('Health')" class="action-btn">Health</button>
                    <button onclick="filterTasks('Finance')" class="action-btn">Finance</button>

                    <div
                        style="border-left: 2px solid #ddd; margin: 0 10px; padding-left: 10px; display: flex; gap: 10px;">
                        <button onclick="filterByStatus('pending')" class="action-btn"
                            style="border: 1px solid #FFD200;">⏳ Pending</button>
                        <button onclick="filterByStatus('completed')" class="action-btn"
                            style="border: 1px solid #2ecc71;">✅ Completed</button>
                    </div>
                </div>
            </div>

            <div id="taskList" class="task-grid">
            </div>

            <button class="fab" onclick="openModal()">+</button>
        </main>
    </div>

    <div id="taskModal" class="modal">
        <div class="modal-content">
            <h2 id="modalTitle">Create New Task</h2>
            <div class="modal-body">
                <label>Task Name</label>
                <input type="text" id="modalTaskName" placeholder="e.g., Design System">

                <div style="display: flex; gap: 15px;">
                    <div style="flex: 1;">
                        <label>Category</label>
                        <select id="modalCategory"
                            style="width: 100%; padding: 10px; border-radius: 8px; border: 1px solid #eee;">
                            <option value="Work">💼 Work</option>
                            <option value="Personal">🏠 Personal</option>
                            <option value="Health">🧘 Health</option>
                            <option value="Finance">💰 Finance</option>
                        </select>
                    </div>
                    <div style="flex: 1;">
                        <label>Priority</label>
                        <select id="modalPriority"
                            style="width: 100%; padding: 10px; border-radius: 8px; border: 1px solid #eee;">
                            <option value="Low">🟢 Low</option>
                            <option value="Medium">🟡 Medium</option>
                            <option value="High">🔴 High</option>
                        </select>
                    </div>
                </div>

                <label>Due Date</label>
                <input type="date" id="modalDate">

                <label>Description</label>
                <textarea id="modalDesc" rows="3" placeholder="Add details..."></textarea>

                <div style="display: flex; gap: 10px; margin-top: 25px;">
                    <button type="button" class="action-btn" onclick="closeModal()"
                        style="flex: 1; padding: 16px; background: #f5f5f5;">
                        CANCEL
                    </button>
                    <button type="button" id="submitBtn" class="btn-submit" onclick="handleTaskSubmit()"
                        style="flex: 2; margin-top: 0;">
                        CREATE TASK
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script src="{{ url_for('static', filename='js/api.js') }}"></script>
    <script src="{{ url_for('static', filename='js/dashboard.js') }}"></script>
</body>

</html>
