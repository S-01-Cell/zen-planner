<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
    <title>ZenPlanner | Reset Password</title>
</head>

<body class="auth-page">
    <div class="web-container auth-card">
        <header>
            <h1 class="brand-gold">Reset Password</h1>
            <p>Update your credentials below.</p>
        </header>

        {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
        {% for category, message in messages %}
        <div class="alert-popup {{ category }}">{{ message }}</div>
        {% endfor %}
        {% endif %}
        {% endwith %}

        <form method="POST" action="{{ url_for('forgot_password') }}">
            <div class="input-group">
                <label>Email Address</label>
                <input type="email" name="email" placeholder="admin@gmail.com" required>
            </div>
            <div class="input-group">
                <label>New Password</label>
                <input type="password" name="password" placeholder="••••••••" required>
            </div>
            <div class="input-group">
                <label>Confirm Password</label>
                <input type="password" name="confirm_password" placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn-primary">RESET PASSWORD</button>
        </form>

        <div class="auth-footer" style="margin-top: 20px; text-align: center;">
            <a href="{{ url_for('login') }}" class="link-gold">← Back to Login</a>
        </div>
    </div>
</body>

</html>
