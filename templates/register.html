<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
    <title>ZenPlanner | Create Account</title>
</head>

<body class="auth-page">
    <div class="web-container auth-card">
        <header>
            <h1 class="brand-gold">Create Account</h1>
            <p style="color: #666; margin-bottom: 20px;">Join ZenPlanner today.</p>
        </header>

        {% with messages = get_flashed_messages() %}
        {% if messages %}
        {% for message in messages %}
        <div class="alert-popup">
            {{ message }}
        </div>
        {% endfor %}
        {% endif %}
        {% endwith %}
        <form method="POST" action="/register">
            <div class="input-group">
                <label>Your email</label>
                <input type="email" name="email" placeholder="youremail@gmail.com" required>
            </div>
            <div class="input-group">
                <label>Password</label>
                <input type="password" name="password" placeholder="••••••••" required>
            </div>
            <div class="input-group">
                <label>Confirm Password</label>
                <input type="password" name="confirm_password" placeholder="••••••••" required>
            </div>

            <button type="submit" class="btn-primary">CREATE ACCOUNT</button>
        </form>

        <div class="auth-footer">
            <p>You have an account? <a href="/login" class="link-gold">Sign in</a></p>
        </div>
    </div>
</body>

</html>
